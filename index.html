<script> // ====== CONFIG: replace with Muthoni's phone number in international format (no +, no spaces) ====== const PHONE_NUMBER = '+254758130962'; // const PHONE_NUMBER = '+254715017200'; document.getElementById('year').textContent = new Date().getFullYear(); document.getElementById('displayPhone').textContent = PHONE_NUMBER.replace(/^([0-9]{3})([0-9]+)/, '+$1 $2'); // Mobile menu toggle const mobileToggle = document.getElementById('mobileToggle'); const mobileMenu = document.getElementById('mobileMenu'); mobileToggle.addEventListener('click', ()=> mobileMenu.classList.toggle('hidden')); // Quick WhatsApp button from outsourcing section document.getElementById('whatsappQuick').addEventListener('click', (e)=>{ e.preventDefault(); const text = encodeURIComponent('Hello Muthoni, I am interested in your outsourcing services. Please advise on next steps.'); window.open(https://wa.me/${PHONE_NUMBER}?text=${text}, '_blank'); }); // Contact form behaviour: send to WhatsApp with prefilled message. Also demonstrates where server-side call could be placed. const form = document.getElementById('contactForm'); const formMessage = document.getElementById('formMessage'); form.addEventListener('submit', async (e)=>{ e.preventDefault(); formMessage.textContent = ''; const data = Object.fromEntries(new FormData(form).entries()); // Build WhatsApp message const waText = encodeURIComponent(New enquiry from website:\nName: ${data.name}\nEmail: ${data.email}\nCountry: ${data.country || 'N/A'}\nMessage: ${data.message}); // Optional: If you have a backend endpoint that will forward the message to a secure WhatsApp Business API or DB, you can POST here. // Example (commented): // try { // const res = await fetch('/api/send-enquiry', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)}); // } catch(err) { console.error(err); } // Fallback / immediate: open WhatsApp chat with prefilled text. const waUrl = https://wa.me/${PHONE_NUMBER}?text=${waText}; // Open in new tab (user can review and click send in WhatsApp web or mobile) window.open(waUrl, '_blank'); formMessage.innerHTML = '<span class="text-sm text-green-600">Your message is being prepared for WhatsApp. Please send it from the opened WhatsApp window to complete submission.</span>'; // Reset form optionally // form.reset(); }); // Booking button scroll and mobile accessibility document.getElementById('bookBtn').addEventListener('click', (e)=>{ e.preventDefault(); document.getElementById('contact').scrollIntoView({behavior:'smooth'}); }); // Simple keyboard accessibility: allow Enter on mobile toggle mobileToggle.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') mobileMenu.classList.toggle('hidden'); }); // keep focus order logical for keyboard users (small enhancement, not a full-a11y audit) </script>
